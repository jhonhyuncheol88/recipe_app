name: recipe_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.18+41

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # 상태 관리
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5
  
  # 데이터베이스
  sqflite: ^2.3.2
  path: ^1.9.0
  
  # 알림 (19.x → 17.x 안정 버전으로 다운그레이드)
  flutter_local_notifications: ^17.2.4
  flutter_timezone: ^4.1.0
  
  # UI 컴포넌트
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  
  # 애니메이션
  animated_text_kit: ^4.2.2
  
  # 폰트
  google_fonts: ^6.3.2
  
  # 유틸리티
  intl: ^0.20.2
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  path_provider: ^2.1.4
  share_plus: ^10.1.3
  file_picker: ^8.1.2
  permission_handler: ^11.3.1
  timezone: ^0.9.4
  fluttertoast: ^8.2.8
  logger: ^2.0.2+1
  url_launcher: ^6.3.0
  flutter_email_sender: ^6.0.3
  fl_chart: ^0.69.0
  in_app_review: ^2.0.10
  
  # 환경 변수 관리
  flutter_dotenv: ^5.1.0
  
  # 라우팅
  go_router: ^14.6.2
  
  # ============================================
  # Firebase (4.x → 3.x 라인 다운그레이드)
  # iOS 빌드 시스템 안정성을 위해 검증된 버전 사용
  # ============================================
  firebase_core: ^3.10.1
  firebase_analytics: ^11.4.4
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.2
  
  change_app_package_name: ^1.5.0
  
  # ============================================
  # Google 인증 (7.x → 6.x 다운그레이드)
  # API 안정성 + Firebase 3.x 호환
  # ============================================
  google_sign_in: ^6.2.2
  
  # Apple 로그인 (SPM 충돌 회피용 7.0.1 핀 유지)
  sign_in_with_apple: 6.1.4
  crypto: ^3.0.6

  # 결제 (RevenueCat)
  purchases_flutter: ^8.1.2
  
  # ============================================
  # AI - google_generative_ai만 사용 (중복 제거)
  # flutter_gemini와 기능 중복이라 하나만 유지
  # ============================================
  google_generative_ai: ^0.4.7
  
  # ML Kit
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.1.2
  
  # ============================================
  # 광고 (6.x → 5.x 다운그레이드)
  # iOS 빌드 안정성 + Flutter 호환 검증
  # ============================================
  google_mobile_ads: ^5.3.1

  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/png/
    - assets/images/
    - assets/json/korea_recipe.json

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Thin.ttf
          weight: 100
        - asset: assets/fonts/Pretendard-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Pretendard-Light.ttf
          weight: 300
        - asset: assets/fonts/Pretendard-Regular.ttf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.ttf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.ttf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Pretendard-Black.ttf
          weight: 900

flutter_launcher_icons:
  android: true
  ios: true
  adaptive_icon_background: "#0066FF"
  image_path: "assets/images/appIcon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/appIcon.png"
    background_color: "#0066FF"
    theme_color: "#0066FF"
  macos:
    generate: true
    image_path: "assets/images/appIcon.png"
  windows:
    generate: true
    image_path: "assets/images/appIcon.png"
  linux:
    generate: true
    image_path: "assets/images/appIcon.png"